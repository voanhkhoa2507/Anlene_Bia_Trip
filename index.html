<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Planner 🌍</title>
  <style>
    :root {
      --pink: #ff6eb4;
      --purple: #a259e6;
      --blue: #5b9cf6;
      --bg: #fdf6ff;
      --card: #ffffff;
      --text: #2d1b4e;
      --border: #eaddf5;
      --muted: #8a7099;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .hero {
      background: linear-gradient(135deg, #ff6eb4 0%, #a259e6 50%, #5b9cf6 100%);
      padding: 50px 20px;
      text-align: center;
      color: white;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .hero p {
      font-size: 16px;
      font-weight: 600;
      opacity: 0.9;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-row h2 {
      font-size: 24px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      background: linear-gradient(135deg, #a259e6, #ff6eb4);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      box-shadow: 0 4px 14px rgba(162, 89, 230, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(162, 89, 230, 0.4);
    }

    .trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .trip-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      box-shadow: 0 4px 20px rgba(162, 89, 230, 0.04);
    }

    .trip-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(162, 89, 230, 0.12);
      border-color: var(--purple);
    }

    .trip-emoji {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .trip-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .trip-meta {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .trip-meta span {
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
    }

    .del-btn,
    .edit-btn {
      position: absolute;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      font-size: 16px;
    }

    .del-btn {
      top: 20px;
      right: 20px;
      background: #fff0f3;
      color: #ff4d6d;
    }

    .edit-btn {
      top: 20px;
      right: 64px;
      background: #ede0ff;
      color: #a259e6;
    }

    .trip-card:hover .del-btn,
    .trip-card:hover .edit-btn {
      opacity: 1;
    }

    .del-btn:hover {
      background: #ffe0e7;
      transform: scale(1.05);
    }

    .edit-btn:hover {
      background: #d4b3f5;
      transform: scale(1.05);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(45, 27, 78, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px) scale(0.95);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    .modal h2 {
      margin-bottom: 24px;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px var(--purple-light);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 30px;
    }

    .btn-blue {
      background: linear-gradient(135deg, #5b9cf6, #2ec4b6);
      color: white;
      box-shadow: 0 4px 14px rgba(91, 156, 246, 0.3);
    }

    .btn-blue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(91, 156, 246, 0.4);
    }

    .btn-ghost {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }

    .btn-ghost:hover {
      background: var(--bg);
      border-color: #d4b3f5;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>🌍 Anlene & Bia Trip Planner</h1>
    <p>Sổ tay du lịch của Bia & Anlene</p>
  </div>

  <div class="container">
    <div class="header-row">
      <h2>🎒 Danh sách chuyến đi</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-blue" onclick="exportAll()">⬇️ Xuất tất cả</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">⬆️ Nhập dữ liệu</button>
        <input id="import-file" type="file" accept="application/json" style="display:none"
          onchange="importAll(this.files && this.files[0]); this.value='';">
        <button class="btn" onclick="openModal()">➕ Thêm chuyến đi</button>
      </div>
    </div>

    <div class="trips-grid" id="trips-grid"></div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modal-title">Tạo chuyến đi mới ✨</h2>
      <div class="input-group">
        <label>Tên chuyến đi (vd: Đà Lạt Trip)</label>
        <input type="text" id="trip-name" placeholder="Vd: Đà Lạt mộng mơ">
      </div>
      <div class="input-group">
        <label>Icon / Emoji (vd: 🌲🛵)</label>
        <input type="text" id="trip-emoji" placeholder="🌲" value="🌍">
      </div>
      <div class="input-group">
        <label>Lịch trình / Tuyến đường (vd: SG → ĐL)</label>
        <input type="text" id="trip-route" placeholder="Vd: SG → ĐL">
      </div>
      <div class="input-group">
        <label>Số ngày đi</label>
        <input type="number" id="trip-days" placeholder="3" value="3" min="1">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
        <button class="btn" id="modal-save-btn" onclick="saveTrip()">🚀 Bắt đầu lên Plan</button>
      </div>
    </div>
  </div>

  <script>
    const TRIPS_LIST_KEY = 'trips-list-v1';
    let trips = [];

    function loadTrips() {
      const saved = localStorage.getItem(TRIPS_LIST_KEY);
      if (saved) {
        trips = JSON.parse(saved);
      } else {
        // Migrate old data if exists
        if (localStorage.getItem('trip-bia-anlene-v2')) {
          trips = [{
            id: 'bia-anlene-saigon',
            name: 'Sài Gòn Trip',
            emoji: '🌆✈️',
            route: 'Đà Nẵng → SGN',
            days: 7
          }];
          localStorage.setItem(TRIPS_LIST_KEY, JSON.stringify(trips));
        }
      }
      renderTrips();
    }

    function renderTrips() {
      const grid = document.getElementById('trips-grid');
      if (!trips.length) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 60px; font-size: 16px; background: white; border-radius: 20px; border: 2px dashed var(--border);">Không có chuyến đi nào.<br><br>Hãy bấm <b>➕ Thêm chuyến đi</b> để bắt đầu lên kế hoạch! 🏕️</div>';
        return;
      }

      grid.innerHTML = trips.map(t => `
    <a href="trip.html?id=${t.id}" class="trip-card">
      <span class="trip-emoji">${t.emoji || '🌍'}</span>
      <div class="trip-name">${t.name}</div>
      <div class="trip-meta">
        <span>📅 ${t.days || 0} ngày</span>
        <span>🛫 ${t.route || 'Chưa rõ'}</span>
      </div>
      <button class="edit-btn" onclick="editTrip(event, '${t.id}')">✏️</button>
      <button class="del-btn" onclick="deleteTrip(event, '${t.id}')">🗑️</button>
    </a>
  `).join('');
    }

    function openModal() {
      document.getElementById('modal').classList.add('active');
      document.getElementById('trip-name').focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('trip-name').value = '';
      document.getElementById('trip-emoji').value = '🌍';
      document.getElementById('trip-route').value = '';
      document.getElementById('trip-days').value = '3';
      // Reset modal to create mode
      editingTripId = null;
      document.getElementById('modal-title').textContent = 'Tạo chuyến đi mới ✨';
      document.getElementById('modal-save-btn').textContent = '🚀 Bắt đầu lên Plan';
      document.getElementById('modal-save-btn').setAttribute('onclick', 'saveTrip()');
    }

    function saveTrip() {
      const name = document.getElementById('trip-name').value.trim();
      if (!name) return alert('Vui lòng nhập tên chuyến đi!');

      const newTrip = {
        id: 'trip_' + Date.now(),
        name,
        emoji: document.getElementById('trip-emoji').value.trim() || '🌍',
        route: document.getElementById('trip-route').value.trim() || 'Chưa rõ',
        days: parseInt(document.getElementById('trip-days').value) || 1
      };

      trips.push(newTrip);
      localStorage.setItem(TRIPS_LIST_KEY, JSON.stringify(trips));
      closeModal();
      renderTrips();
    }

    function deleteTrip(e, id) {
      e.preventDefault(); // prevent navigation
      e.stopPropagation();
      if (!confirm('Bạn có chắc muốn xóa toàn bộ dữ liệu của chuyến đi này không?')) return;

      trips = trips.filter(t => t.id !== id);
      localStorage.setItem(TRIPS_LIST_KEY, JSON.stringify(trips));

      // Cleanup localStorage items for this trip
      localStorage.removeItem(`trip-state-${id}`);
      localStorage.removeItem(`trip-notes-${id}`);

      renderTrips();
    }

    let editingTripId = null;

    function editTrip(e, id) {
      e.preventDefault();
      e.stopPropagation();
      const trip = trips.find(t => t.id === id);
      if (!trip) return;
      editingTripId = id;
      document.getElementById('modal-title').textContent = 'Chỉnh sửa chuyến đi ✏️';
      document.getElementById('modal-save-btn').textContent = '💾 Lưu thay đổi';
      document.getElementById('modal-save-btn').setAttribute('onclick', 'saveEditTrip()');
      document.getElementById('trip-name').value = trip.name || '';
      document.getElementById('trip-emoji').value = trip.emoji || '🌍';
      document.getElementById('trip-route').value = trip.route || '';
      document.getElementById('trip-days').value = trip.days || 3;
      document.getElementById('modal').classList.add('active');
      document.getElementById('trip-name').focus();
    }

    function saveEditTrip() {
      if (!editingTripId) return;
      const trip = trips.find(t => t.id === editingTripId);
      if (!trip) return;

      const name = document.getElementById('trip-name').value.trim();
      if (!name) return alert('Vui lòng nhập tên chuyến đi!');

      trip.name = name;
      trip.emoji = document.getElementById('trip-emoji').value.trim() || '🌍';
      trip.route = document.getElementById('trip-route').value.trim() || 'Chưa rõ';
      trip.days = parseInt(document.getElementById('trip-days').value) || 1;

      localStorage.setItem(TRIPS_LIST_KEY, JSON.stringify(trips));
      editingTripId = null;
      closeModal();
      renderTrips();
    }

    function exportAll() {
      const payload = {
        app: 'trip-planner',
        version: 1,
        exportedAt: new Date().toISOString(),
        trips: trips,
        tripData: {}
      };
      trips.forEach(t => {
        const stateData = localStorage.getItem(`trip-state-${t.id}`);
        const notesData = localStorage.getItem(`trip-notes-${t.id}`);
        payload.tripData[t.id] = {
          state: stateData ? JSON.parse(stateData) : null,
          notes: notesData || ''
        };
      });
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `trip-planner-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importAll(file) {
      if (!file) return;
      if (!confirm('Nhập dữ liệu sẽ ghi đè toàn bộ dữ liệu hiện tại. Tiếp tục?')) return;
      const reader = new FileReader();
      reader.onerror = () => alert('Không đọc được file.');
      reader.onload = () => {
        try {
          const json = JSON.parse(reader.result);
          if (!json || !Array.isArray(json.trips)) {
            alert('File không đúng định dạng!'); return;
          }
          // Clear old trip data
          trips.forEach(t => {
            localStorage.removeItem(`trip-state-${t.id}`);
            localStorage.removeItem(`trip-notes-${t.id}`);
          });
          // Restore trips list
          trips = json.trips;
          localStorage.setItem(TRIPS_LIST_KEY, JSON.stringify(trips));
          // Restore each trip's data
          if (json.tripData && typeof json.tripData === 'object') {
            Object.keys(json.tripData).forEach(id => {
              const d = json.tripData[id];
              if (d.state) localStorage.setItem(`trip-state-${id}`, JSON.stringify(d.state));
              if (d.notes) localStorage.setItem(`trip-notes-${id}`, d.notes);
            });
          }
          renderTrips();
          alert('✅ Đã nhập dữ liệu thành công!');
        } catch (e) {
          alert('Lỗi khi đọc file: ' + e.message);
        }
      };
      reader.readAsText(file);
    }

    loadTrips();
  </script>
</body>

</html>
